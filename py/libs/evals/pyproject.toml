[project]
name = "ms-evals"
version = "0.0.0"
description = "Evaluation scenarios for data cleanup and responsible AI testing"
requires-python = "==3.12.*"

dependencies = [
    "ms-common-models",
    "pydantic>=2.8.0",
    "httpx>=0.28.0",
]

[dependency-groups]
dev = [
    "pyright>=1.1.407",
    "pytest>=9.0.1",
    "pytest-asyncio>=1.2.0",
]

[tool.uv.sources]
ms-common-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ms"]
